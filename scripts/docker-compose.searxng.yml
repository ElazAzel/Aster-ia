version: '3.7'

services:
  searxng:
    container_name: asterion-searxng
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng_settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - INSTANCE_NAME=asterion-searxng
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
