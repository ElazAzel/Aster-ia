# SearXNG configuration
use_default_settings: true

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "asterion_searxng_secret_key_change_me_in_production"

search:
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: go
    timeout: 3.0
    active: true
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    timeout: 3.0
    active: true
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    timeout: 2.0
    active: true
