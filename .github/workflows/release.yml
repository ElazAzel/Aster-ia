name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
            extension: ''
          - platform: 'ubuntu-22.04'
            args: '--target x86_64-unknown-linux-gnu'
            target: 'x86_64-unknown-linux-gnu'
            extension: ''
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            target: 'x86_64-pc-windows-msvc'
            extension: '.exe'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Python & uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 'latest'

      - name: Install Python dependencies & PyInstaller
        working-directory: backend
        run: |
          uv sync --extra dev
          uv pip install pyinstaller

      - name: Build Python Sidecar Binary
        working-directory: backend
        run: |
          uv run pyinstaller --onefile --name asterion-backend main.py

      - name: Move Sidecar Binary to Tauri directory
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            cp backend/dist/asterion-backend.exe src-tauri/binaries/asterion-backend-${{ matrix.target }}${{ matrix.extension }}
          else
            cp backend/dist/asterion-backend src-tauri/binaries/asterion-backend-${{ matrix.target }}${{ matrix.extension }}
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Tauri Desktop Shell
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Asterion AI ${{ github.ref_name }}'
          releaseBody: 'Автоматический релиз Asterion AI от GitHub Actions.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
