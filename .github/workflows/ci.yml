name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version
      - run: uv sync --dev
        working-directory: backend
      - run: uv run python -m compileall backend/asterion_api
      - run: uv run python -m pytest tests/ -v
        working-directory: backend
      - run: uv run python harness/meta_harness.py --phase 1 --iterations 1
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
