name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check asterion_api tests

      - name: Compile check
        working-directory: backend
        run: uv run python -m compileall asterion_api

      - name: Tests
        working-directory: backend
        env:
          ASTERION_ALLOW_PLAINTEXT_SQLITE_FOR_DEV: "1"
        run: uv run pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  harness:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Install backend deps
        working-directory: backend
        run: uv sync
      - name: Run Meta-Harness smoke
        run: uv run python harness/meta_harness.py --phase 1 --iterations 1

  tauri-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check
