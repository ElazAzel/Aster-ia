name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        working-directory: backend
        run: uv sync --extra dev
      - name: Compile check
        working-directory: backend
        run: uv run python -m compileall asterion_api
      - name: Tests
        working-directory: backend
        env:
          ASTERION_ALLOW_PLAINTEXT_SQLITE_FOR_DEV: "1"
        run: uv run pytest tests/ -v

  harness:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Run Meta-Harness smoke
        run: uv run python harness/meta_harness.py --phase 1 --iterations 1
